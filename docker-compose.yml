version: '3.9'

services:
  db:
    image: postgres:15
    container_name: kantuta_db
    environment:
      POSTGRES_USER: kantuta
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kantuta_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kantuta"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend_net

  ollama:
    image: ollama/ollama:latest
    container_name: kantuta_ollama
    environment:
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_MAX_LOADED_MODELS: 1
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    entrypoint: sh -c "ollama serve & sleep 5 && ollama pull qwen3:8b && wait"
    restart: unless-stopped
    networks:
      - backend_net

volumes:
  db_data:
  ollama_data:

networks:
  backend_net:
    driver: bridge